[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-collab"
version = "0.1.0"
description = "Terminal referee for Claude Code and Codex collaboration."
readme = "README.md"
requires-python = ">=3.9"
authors = [{ name = "agent-collab prototype" }]
dependencies = []

[project.optional-dependencies]
# The `sdk` backend for Antigravity. Base install + default `cli` backend stay
# standard-library only; this extra is the only dependency and is lazy-imported.
# Tested against google-antigravity 0.1.5 (needs Python >= 3.10, so this extra is
# simply unavailable on the base 3.9 target — see doc/tasks_closed/stage-4.9).
antigravity-sdk = ["google-antigravity>=0.1,<1"]

[project.scripts]
agent-collab = "agent_collab.cli:main"
agent-collab-mcp = "agent_collab.mcp_server:main"

[tool.setuptools.packages.find]
include = ["agent_collab*"]
