  <text y="52" font-family="'DejaVu Sans Mono','Menlo','Cascadia Mono','Consolas',monospace" font-size="14" xml:space="preserve"><tspan x="16.0" textLength="193.9" lengthAdjust="spacingAndGlyphs" fill="#C2B6A3"> review the poller race</tspan><tspan x="209.9" textLength="25.3" lengthAdjust="spacingAndGlyphs" fill="#8C8170"> · </tspan><tspan x="235.2" textLength="50.6" lengthAdjust="spacingAndGlyphs" fill="#D97757">claude</tspan><tspan x="285.8" textLength="75.9" lengthAdjust="spacingAndGlyphs" fill="#C2B6A3">:opus-4.8</tspan><tspan x="361.6" textLength="25.3" lengthAdjust="spacingAndGlyphs" fill="#8C8170"> · </tspan><tspan x="386.9" textLength="42.1" lengthAdjust="spacingAndGlyphs" fill="#10A37F">codex</tspan><tspan x="429.1" textLength="50.6" lengthAdjust="spacingAndGlyphs" fill="#C2B6A3">:gpt-5</tspan><tspan x="479.6" textLength="25.3" lengthAdjust="spacingAndGlyphs" fill="#8C8170"> · </tspan><tspan x="504.9" textLength="101.2" lengthAdjust="spacingAndGlyphs" fill="#C2B6A3">cross-review</tspan></text>
