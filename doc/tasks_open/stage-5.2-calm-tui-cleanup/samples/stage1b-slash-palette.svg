  <text y="94" font-family="'DejaVu Sans Mono','Menlo','Cascadia Mono','Consolas',monospace" font-size="14" xml:space="preserve"><tspan x="16.0" textLength="84.3" lengthAdjust="spacingAndGlyphs" fill="#D97757" font-weight="600"> claude   </tspan><tspan x="100.3" textLength="539.5" lengthAdjust="spacingAndGlyphs" fill="#F6EFE2">Looking at _poll_loop — the epoch guard in _drain_events already</tspan></text>
  <text y="115" font-family="'DejaVu Sans Mono','Menlo','Cascadia Mono','Consolas',monospace" font-size="14" xml:space="preserve"><tspan x="100.3" textLength="547.9" lengthAdjust="spacingAndGlyphs" fill="#F6EFE2">drops stale batches, so the terminal-status early return is safe.</tspan></text>
  <text y="136" font-family="'DejaVu Sans Mono','Menlo','Cascadia Mono','Consolas',monospace" font-size="14" xml:space="preserve"><tspan x="16.0" textLength="84.3" lengthAdjust="spacingAndGlyphs" fill="#10A37F" font-weight="600"> codex    </tspan><tspan x="100.3" textLength="539.5" lengthAdjust="spacingAndGlyphs" fill="#F6EFE2">Agreed. wait_events re-reads the session on empty batches, which</tspan></text>
