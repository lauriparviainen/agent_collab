<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800" role="img" aria-labelledby="title desc">
  <title id="title">Grok CLI layout reference</title>
  <desc id="desc">Simplified vector recreation of the provided Grok CLI screenshot for agent-collab TUI planning.</desc>
  <rect width="1600" height="800" fill="#101010"/>

  <text x="34" y="48" fill="#777777" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">main ~/projects/agent_collab</text>
  <text x="1466" y="48" fill="#e8e8e8" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">13K / 512K</text>

  <rect x="34" y="76" width="1532" height="66" fill="#242424"/>
  <text x="66" y="112" fill="#777777" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700">&gt;</text>
  <text x="88" y="112" fill="#f2f2f2" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700">hello</text>
  <text x="1466" y="112" fill="#777777" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">9:22 AM</text>

  <text x="66" y="180" fill="#8a8a8a" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700">◆ Thought for 1.0s</text>
  <text x="66" y="224" fill="#dddddd" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700">Hello!</text>
  <text x="1466" y="224" fill="#777777" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">9:22 AM</text>

  <text x="66" y="270" fill="#dddddd" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700">
    <tspan x="66" dy="0">I'm Grok, here to help with software engineering tasks in this workspace. The current project is </tspan>
    <tspan fill="#22a6b7">agent-collab</tspan>
    <tspan> (a local CLI/</tspan>
    <tspan x="66" dy="26">daemon for supervising collaboration between Claude Code and Codex).</tspan>
  </text>
  <text x="66" y="342" fill="#dddddd" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700">What would you like to work on?</text>
  <text x="66" y="388" fill="#777777" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700">Turn completed in 2.9s.</text>

  <line x1="34" y1="512" x2="1566" y2="512" stroke="#2c2c2c" stroke-width="1"/>
  <text x="1534" y="506" fill="#777777" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">66</text>

  <rect x="34" y="524" width="1532" height="130" fill="#242424"/>
  <rect x="34" y="524" width="1508" height="22" fill="#3a3a3a"/>
  <text x="66" y="544" fill="#f2f2f2" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700">&gt; /quit</text>
  <text x="262" y="544" fill="#7c7c7c" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700">Quit the application</text>
  <text x="88" y="570" fill="#f2f2f2" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700">/help</text>
  <text x="262" y="570" fill="#7c7c7c" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700">Browse commands and keyboard shortcuts</text>
  <text x="88" y="596" fill="#f2f2f2" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700">/docs</text>
  <text x="262" y="596" fill="#7c7c7c" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700">Open docs</text>
  <text x="88" y="622" fill="#f2f2f2" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700">/new</text>
  <text x="262" y="622" fill="#7c7c7c" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700">Start a new session</text>

  <line x1="34" y1="666" x2="1566" y2="666" stroke="#2c2c2c" stroke-width="1"/>
  <rect x="40" y="690" width="1520" height="44" rx="6" fill="#111111" stroke="#62626b" stroke-width="1.5"/>
  <text x="62" y="720" fill="#f2f2f2" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700">&gt; /</text>
  <line x1="872" y1="734" x2="1336" y2="734" stroke="#62626b" stroke-width="1"/>
  <text x="1348" y="720" fill="#8a8a8a" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">Grok Build · </text>
  <text x="1490" y="720" fill="#8aa7ff" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">auto</text>

  <text x="34" y="784" fill="#dddddd" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">Enter:send</text>
  <text x="168" y="784" fill="#777777" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">|</text>
  <text x="198" y="784" fill="#dddddd" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">Shift+Tab:mode</text>
  <text x="376" y="784" fill="#777777" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">|</text>
  <text x="404" y="784" fill="#dddddd" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">Ctrl+x:shortcuts</text>
</svg>
