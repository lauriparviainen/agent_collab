name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install static tooling
        run: python -m pip install 'ruff==0.15.20'
      - name: Install base dependencies for the hermetic suite
        run: python -m pip install 'tomlkit>=0.13,<1'
      - name: Run Ruff lint
        run: ruff check --output-format=github .
      - name: Run Ruff format check
        run: ruff format --check .
      - name: Run hermetic tests
        run: python -m unittest discover -s tests -t .
      - name: Verify generated API artifacts
        run: ./agent_collab_dev.sh build --check
      - name: Verify SDK-free base install
        run: |
          python -m pip install .
          agent-collab --help
