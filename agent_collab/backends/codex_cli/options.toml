schema_version = 1

[options.model]
type = "string"
inferred = true

[options.profile]
type = "string"
inferred = true

[options.thinking_level]
type = "string"
allowed = ["minimal", "low", "medium", "high", "xhigh"]
inferred = true

[options.reasoning_effort]
type = "string"
allowed = ["minimal", "low", "medium", "high", "xhigh"]
inferred = true

[options.sandbox]
type = "string"
allowed = ["read-only", "workspace-write", "danger-full-access"]
inferred = true

[options.approval_policy]
type = "string"
allowed = ["untrusted", "on-failure", "on-request", "never"]
inferred = true

[options.search]
type = "boolean"
allowed = [true, false]
inferred = true
