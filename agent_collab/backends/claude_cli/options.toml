schema_version = 1

[options.model]
type = "string"
allowed = ["fable", "sonnet", "opus"]
inferred = true

[options.permission_mode]
type = "string"
allowed = ["default", "plan", "acceptEdits", "bypassPermissions"]
inferred = true

[options.thinking_level]
type = "string"
allowed = ["low", "medium", "high", "xhigh", "max"]
inferred = true

[options.thinking_budget_tokens]
type = "integer"
min = 0
max = 32768
inferred = true
