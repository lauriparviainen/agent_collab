schema_version = 9

##### SYSTEM CONFIG #####

[system]
timezone = "local"


##### USAGE WINDOWS #####

[usage_windows]
# Usage-window alignment makes normal paid provider requests on a schedule.
# Every target is disabled by default; enable only the target you intend to use.
days = ["mon", "tue", "wed", "thu", "fri"]
work_time = { start = "09:00", end = "17:00" }
interval = "5h"
jitter = "5m"

[usage_windows.targets.claude_cli_sonnet]
enabled = false
backend = "claude_cli"
model = "sonnet"

[usage_windows.targets.claude_cli_sonnet.options]
thinking_level = "low"
permission_mode = "plan"

[usage_windows.targets.claude_sdk_sonnet]
enabled = false
backend = "claude_sdk"
model = "sonnet"

[usage_windows.targets.claude_sdk_sonnet.options]
thinking_level = "low"
permission_mode = "plan"

[usage_windows.targets.codex_cli_luna]
enabled = false
backend = "codex_cli"
model = "gpt-5.6-luna"

[usage_windows.targets.codex_cli_luna.options]
thinking_level = "low"
sandbox = "read-only"

[usage_windows.targets.codex_sdk_luna]
enabled = false
backend = "codex_sdk"
model = "gpt-5.6-luna"

[usage_windows.targets.codex_sdk_luna.options]
thinking_level = "low"
sandbox = "read-only"

[usage_windows.targets.antigravity_cli_flash_low]
enabled = false
backend = "antigravity_cli"
model = "Gemini 3.5 Flash (Low)"

[usage_windows.targets.antigravity_cli_flash_low.options]
mode = "plan"
sandbox = true

[usage_windows.targets.antigravity_sdk_flash_low]
enabled = false
backend = "antigravity_sdk"
model = "Gemini 3.5 Flash (Low)"

[usage_windows.targets.xai_cli_grok_4_5]
enabled = false
backend = "xai_cli"
model = "grok-4.5"

[usage_windows.targets.xai_cli_grok_4_5.options]
thinking_level = "low"
sandbox = "read-only"
provider_max_turns = 1

[usage_windows.targets.xai_sdk_grok_4_5]
enabled = false
backend = "xai_sdk"
model = "grok-4.5"

[usage_windows.targets.xai_sdk_grok_4_5.options]
thinking_level = "low"


##### BACKENDS #####

# The schema is backend-first: every enabled [backends.<canonical>] section
# defines its default agent under the same id. Nested options-only personae
# live in [backends.<canonical>.agents.<name>].
#
# Each [backends.<canonical>.options] table below carries the shipped option
# defaults, including the write posture. They rank below flags configured in
# `args` and below user-config [backends.*.options], so overriding any single
# value never drops the rest. Defaults lean read-only: agents can call tools
# and inspect the repository, but file writes need an explicit opt-in per
# backend, persona, or session.

[backends.claude_cli]
enabled = true
command = "claude"
args = ["-p", "--output-format", "stream-json", "--verbose"]

[backends.claude_cli.options]
model = "opus"
thinking_level = "high"
# Headless "default" denies write/exec tools instead of prompting; "plan" is
# the strictest read-only mode. Writes need "acceptEdits" or stronger.
permission_mode = "default"

[backends.codex_cli]
enabled = true
command = "codex"
args = ["exec", "--json"]

[backends.codex_cli.options]
model = "gpt-5.6-sol"
thinking_level = "high"
# Commands run but cannot write outside the sandbox; use "workspace-write"
# for turns that must edit files.
sandbox = "read-only"

# Antigravity is enabled so a local `agy` setup works out of the box. When the
# CLI is absent the backend is simply reported unavailable and skipped; no
# built-in workflow references it, so default Claude/Codex behavior is
# unaffected. Turn it off with `enabled = false` in your user config.
[backends.antigravity_cli]
enabled = true
command = "agy"
args = ["-p"]

[backends.antigravity_cli.options]
model = "Gemini 3.5 Flash (High)"
# "plan" is read-only and does not stall headless runs on approval prompts;
# "accept-edits" auto-approves edits and is the explicit write opt-in. The
# boolean sandbox option additionally restricts terminal commands.
mode = "plan"

# xAI is enabled so a local `grok` setup works out of the box; when the CLI is
# absent the backend is reported unavailable and skipped. Grok Build uses
# newline-delimited streaming JSON in headless single-turn mode. Turn it off
# with `enabled = false` in your user config.
[backends.xai_cli]
enabled = true
command = "grok"
args = ["--no-auto-update", "--output-format", "streaming-json", "-p"]

[backends.xai_cli.options]
model = "grok-4.5"
thinking_level = "high"
# Inspection commands run without approval prompts while the read-only
# sandbox blocks repository writes: the sandbox, not the prompt gate, is the
# safety boundary. Do not switch headless runs to "auto" (or "plan"): a
# command grok's classifier will not auto-approve — reliably a ";"-chained
# pipeline — raises a permission prompt no one can answer headlessly, and
# after 15s grok cancels the whole turn (surfaced as provider_turn_cancelled).
permission_mode = "bypassPermissions"
sandbox = "read-only"

# SDK backends are opt-in; they need their provider SDK installed and are
# declared here so member selection and workflow references resolve to a
# known backend.
[backends.claude_sdk]
enabled = false

[backends.claude_sdk.options]
model = "opus"
thinking_level = "high"
permission_mode = "default"

[backends.codex_sdk]
enabled = false

[backends.codex_sdk.options]
model = "gpt-5.6-sol"
thinking_level = "high"
sandbox = "read-only"

# The Antigravity SDK exposes no mode/permission control; its write posture
# follows the provider default.
[backends.antigravity_sdk]
enabled = false

[backends.antigravity_sdk.options]
model = "Gemini 3.5 Flash (High)"

# The xAI SDK backend is remote chat only and enables no tools.
[backends.xai_sdk]
enabled = false

[backends.xai_sdk.options]
model = "grok-4.5"
thinking_level = "high"


##### WORKFLOWS #####

# One single-agent shape. The default member is Claude; start-time member
# selection (`members = {"claude_cli" = "<agent>"}`) runs any other enabled
# agent without extra workflow ids. Fixed aliases remain one user-config line:
# [workflows.solo-xai-cli] sequence = ["xai_cli"].

[workflows.solo]
sequence = ["claude_cli"]

[workflows.cross-review]
sequence = ["claude_cli", "codex_cli", "claude_cli"]

[workflows.dual-review]
parallel = ["claude_cli", "codex_cli"]

# The scheduler replaces this placeholder member through the ordinary
# start-time member/options override path. Manual starts remain ordinary starts.
[workflows.usage-window]
sequence = ["claude_cli"]
