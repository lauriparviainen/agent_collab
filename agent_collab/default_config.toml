schema_version = 4

[agents.claude]
type = "claude"
command = "claude"
args = ["-p", "--output-format", "stream-json", "--verbose"]
enabled = true

[agents.codex]
type = "codex"
command = "codex"
args = ["exec", "--json"]
enabled = true

# Antigravity is opt-in. No built-in workflow references it while disabled, so
# the default Claude/Codex behavior stays valid without local `agy` setup.
[agents.antigravity]
type = "antigravity"
command = "agy"
args = ["--mode", "accept-edits", "-p"]
backend = "cli"
enabled = false

[workflows.solo-claude]
sequence = ["claude"]

[workflows.solo-codex]
sequence = ["codex"]

[workflows.cross-review]
sequence = ["claude", "codex", "claude"]

[workflows.compare]
sequence = ["claude", "codex"]
